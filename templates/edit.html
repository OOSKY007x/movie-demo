<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>🎬 จัดการข้อมูลหนัง</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass-box {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { color: #ff4757; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff4757;
            box-shadow: 0 0 10px rgba(255, 71, 87, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 71, 87, 0.5); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

<div class="glass-box">
    <h2>จัดการข้อมูลหนัง</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>🎬 ชื่อภาพยนตร์</label>
            <input name="title" value="{{ movie.title if movie else '' }}" required>
        </div>
        <div class="form-group">
            <label>🏷️ แนวหนัง</label>
            <input name="genre" value="{{ movie.genre if movie else '' }}">
        </div>
        <div class="form-group">
            <label>💰 ราคาตั๋ว (บาท)</label>
            <input name="price" type="number" step="0.01" value="{{ movie.price if movie else '' }}" required>
        </div>
        <div class="form-group">
            <label>🖼️ URL โปสเตอร์</label>
            <input name="image" value="{{ movie.image if movie else '' }}">
        </div>
        <div class="form-group">
            <label>🏢 โรงภาพยนตร์</label>
            <input name="theater" value="{{ movie.theater if movie else '' }}">
        </div>
        <div class="form-group">
            <label>⏰ รอบฉาย</label>
            <input name="show_time" value="{{ movie.show_time if movie else '' }}">
        </div>
        <button type="submit">บันทึกข้อมูล ✨</button>
    </form>
    <a href="/" class="back-link">⬅️ กลับหน้าหลัก</a>
</div>

</body>
</html>
